<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シロクマ報告ベル</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            user-select: none;
        }
        #bell-container {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #f1c40f, #d4ac0d);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5), inset 0 0 30px rgba(255,255,255,0.5);
            cursor: pointer;
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        #bell-container:active {
            transform: scale(0.95);
        }
        .text {
            margin-top: 30px;
            text-align: center;
        }
        #counter {
            font-size: 2rem;
            font-weight: bold;
            color: #f1c40f;
        }
    </style>
</head>
<body>

    <div id="bell-container" onclick="playOrin()">
        <span style="font-size: 80px;">🔔</span>
    </div>

    <div class="text">
        <p>シロクマを思い浮かべたらタップ</p>
        <div id="counter">0 回</div>
    </div>

    <script>
        let count = 0;
        // 「おりん」に近い澄んだサイン波の音を合成して鳴らす
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playOrin() {
            const now = audioCtx.currentTime;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            // おりんの主成分に近い周波数（落ち着いた高い音）
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, now); // A5の音

            // 響きを出すための倍音（おりん特有の揺らぎ）
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.frequency.setValueAtTime(882, now); // わずかにずらして「うなり」を作る

            gainNode.gain.setValueAtTime(0.5, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 4); // 4秒かけてゆっくり消える余韻

            oscillator.connect(gainNode);
            osc2.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            osc2.start();
            oscillator.stop(now + 4);
            osc2.stop(now + 4);

            // カウンター更新
            count++;
            document.getElementById('counter').innerText = count + " 回";
        }
    </script>
</body>
</html>
